<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Страница не найдена — Строй Кэш</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'TildaSans', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .wrap { max-width: 480px; }
    .code { font-size: 96px; font-weight: 700; color: #1a1a1a; line-height: 1; }
    .title { font-size: 24px; font-weight: 600; color: #1a1a1a; margin: 16px 0 8px; }
    .desc { font-size: 16px; color: #666; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .75; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="title">Страница не найдена</div>
    <div class="desc">Возможно, страница была удалена или вы перешли по неверной ссылке.</div>
    <a href="/" class="btn">На главную</a>
  </div>
</body>
</html>
