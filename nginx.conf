# WebP negotiation: browser sends Accept: image/webp → suffix ".webp", else ""
# try_files will look for image.png.webp first, then fall back to image.png
map $http_accept $webp_suffix {
    default  "";
    "~*webp" ".webp";
}

server {
    listen 80;
    server_name doma.stroycash.ru;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Brotli (лучше gzip на 15–20% для текста)
    brotli on;
    brotli_comp_level 6;
    brotli_static on;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        font/woff;

    # Gzip — fallback для браузеров без Brotli
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        font/woff;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache: fonts
    location ~* \.(woff2|woff|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Cache: CSS/JS
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Images: serve WebP automatically when browser supports it
    # Browser with WebP: requests image.png → nginx serves image.png.webp
    # Browser without WebP: requests image.png → nginx serves image.png
    location ~* \.(png|jpe?g)$ {
        add_header Vary Accept;
        expires 90d;
        add_header Cache-Control "public, max-age=7776000";
        try_files $uri$webp_suffix $uri =404;
    }

    # SVG, ICO, GIF, WebP — serve as-is
    location ~* \.(svg|ico|gif|webp)$ {
        expires 90d;
        add_header Cache-Control "public, max-age=7776000";
    }

    # URL rewrites — slug → html file
    location = / {
        try_files /index.html =404;
    }

    # Blog
    location = /blog {
        try_files /blog/index.html =404;
    }

    location ~ ^/blog/([a-z0-9-]+)$ {
        try_files /blog/$1.html =404;
    }

    location = /ychastok {
        try_files /ychastok.html =404;
    }

    location = /policy {
        try_files /policy.html =404;
    }

    location = /agreement {
        try_files /agreement.html =404;
    }

    location = /cookie-files {
        try_files /cookie-files.html =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    # 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Default
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
